<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <meta property="og:title"       content="{{ .Site.Title }}">
  <meta property="og:description" content="{{ .Site.Params.description }}">
  <meta property="og:url"         content="{{ .Site.BaseURL }}">
  <meta name="theme-color"        content="#f97316">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles (compiled by Tailwind CLI) -->
  <link rel="stylesheet" href="/css/main.css">

  <!-- Worker URL injected for JS -->
  <script>window.WORKER_URL = "{{ .Site.Params.workerURL }}";</script>
</head>
<body>
  {{ block "main" . }}{{ end }}
  {{ $jsOpts := dict "minify" hugo.IsProduction "sourceMap" "inline" }}
  {{ $js := resources.Get "js/activity.ts" | js.Build $jsOpts }}
  <script src="{{ $js.RelPermalink }}" defer></script>
</body>
</html>
