<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <meta property="og:title"       content="{{ .Site.Title }}">
  <meta property="og:description" content="{{ .Site.Params.description }}">
  <meta property="og:url"         content="{{ .Site.BaseURL }}">
  <meta name="theme-color"        content="#f97316">

  <!-- Fonts (self-hosted — preload the two faces used above the fold) -->
  <link rel="preload" href="/fonts/bebas-neue-latin-400-normal.woff2"    as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/ibm-plex-mono-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Styles (compiled by Tailwind CLI) -->
  <link rel="stylesheet" href="/css/main.css">

  <!-- Worker URL injected for JS -->
  <script>window.WORKER_URL = "{{ .Site.Params.workerURL }}";</script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  {{ block "main" . }}{{ end }}
  {{ $jsOpts := dict "minify" hugo.IsProduction "sourceMap" "inline" }}
  {{ $js := resources.Get "js/activity.ts" | js.Build $jsOpts }}
  <script src="{{ $js.RelPermalink }}" defer></script>
</body>
</html>
